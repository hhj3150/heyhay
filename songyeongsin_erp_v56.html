<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>송영신목장 ERP V56</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f0f4f8; }
        .card { background: white; border-radius: 1rem; padding: 1.25rem; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; }
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; cursor: pointer; height: 20px; margin: 8px 0; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 8px; border-radius: 4px; background: #e2e8f0; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 24px; width: 24px; border-radius: 50%; background: #fff; border: 4px solid currentColor; margin-top: -9px; }
        .tmr-table, .acc-table { width: 100%; border-collapse: separate; border-spacing: 0; font-size: 0.8rem; }
        .tmr-table th, .acc-table th { background: #f8fafc; padding: 8px; border-bottom: 2px solid #e2e8f0; font-weight: 700; }
        .tmr-table td, .acc-table td { padding: 6px 8px; border-bottom: 1px solid #f1f5f9; text-align: center; }
        .acc-table td:first-child { text-align: left; }
        .tmr-table input { width: 100%; text-align: center; border: 1px solid transparent; background: transparent; font-weight: 700; border-radius: 4px; }
        .tmr-total td, .total-row td { background: #f8fafc; font-weight: 800; border-top: 2px solid #cbd5e1; }
        .sub-row td { color: #64748b; padding-left: 1.5rem !important; font-size: 0.75rem; }
        .status-bar { position: sticky; top: 0; z-index: 50; background: linear-gradient(90deg, #0f172a, #1e293b); color: white; padding: 0.75rem 1.5rem; }
        .status-value { font-family: 'Courier New', monospace; font-weight: 700; font-size: 1.25rem; }
        .tab-btn { flex: 1; padding: 12px; font-size: 0.95rem; font-weight: 600; color: #64748b; border-bottom: 4px solid transparent; }
        .tab-active { background: white; border-bottom-color: currentColor; color: #0f172a; }
        .indicator { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; border: 1px solid; }
        .ind-good { background: #dcfce7; color: #166534; border-color: #bbf7d0; }
        .ind-warn { background: #fef9c3; color: #854d0e; border-color: #fde047; }
        .ind-bad { background: #fee2e2; color: #b91c1c; border-color: #fecaca; }
        .ai-col { background-color: #f0fdf4; color: #15803d; font-weight: 700; }
        .val { font-family: 'Courier New', monospace; }
        .product-card { background: linear-gradient(135deg, #f8fafc, #f1f5f9); border-radius: 0.75rem; padding: 1rem; border: 1px solid #e2e8f0; }
    </style>
</head>
<body class="text-slate-800 h-screen flex flex-col overflow-hidden">
    <div class="status-bar flex justify-between items-center shrink-0">
        <div class="flex items-center gap-4">
            <div class="bg-amber-500 text-white p-2 rounded-lg font-black text-2xl">S</div>
            <div><h1 class="font-bold text-xl text-white">Song's ERP <span class="text-amber-400">V56</span></h1><p class="text-[10px] text-slate-400">Factory & Cafe Redesign</p></div>
        </div>
        <div class="flex gap-8 items-center">
            <div class="flex flex-col items-end"><span class="text-[10px] text-amber-500 font-bold">RANCH</span><span id="st-ranch" class="status-value text-amber-400">0</span></div>
            <div class="w-px h-8 bg-slate-600"></div>
            <div class="flex flex-col items-end"><span class="text-[10px] text-blue-500 font-bold">FACTORY</span><span id="st-factory" class="status-value text-blue-400">0</span></div>
            <div class="w-px h-8 bg-slate-600"></div>
            <div class="flex flex-col items-end"><span class="text-[10px] text-emerald-500 font-bold">CAFE</span><span id="st-cafe" class="status-value text-emerald-400">0</span></div>
            <div class="w-px h-8 bg-slate-600"></div>
            <div class="flex flex-col items-end bg-slate-700/50 px-4 py-1 rounded-lg"><span class="text-[10px] text-white font-bold">TOTAL</span><span id="st-total" class="status-value text-white text-3xl">0</span></div>
        </div>
    </div>
    <nav class="bg-white border-b flex shrink-0 z-40">
        <button onclick="app.navigate('ranch')" id="nav-ranch" class="tab-btn tab-active">🐄 1. 목장</button>
        <button onclick="app.navigate('factory')" id="nav-factory" class="tab-btn">🏭 2. 공장</button>
        <button onclick="app.navigate('sales')" id="nav-sales" class="tab-btn">☕ 3. 카페</button>
        <button onclick="app.navigate('dashboard')" id="nav-dashboard" class="tab-btn">📊 4. 대시보드</button>
    </nav>
    <main id="main-content" class="flex-grow p-6 overflow-y-auto bg-slate-100/50"></main>
    <div id="aiModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-xl w-full max-w-3xl max-h-[85vh] flex flex-col overflow-hidden">
            <div class="bg-slate-900 p-5 flex justify-between items-center text-white"><h3 class="font-bold text-xl">🤖 AI 진단</h3><button onclick="document.getElementById('aiModal').classList.add('hidden')" class="text-2xl">&times;</button></div>
            <div class="p-8 bg-slate-50 overflow-y-auto flex-grow"><div id="aiModalContent" class="prose max-w-none text-sm"></div></div>
        </div>
    </div>
<script>
const nutriDB={alfalfa:{name:'알팔파',dm:88,nel:1.35,cp:18,n6:5,n3:15,type:'roughage'},timothy:{name:'티모시',dm:88,nel:1.25,cp:12,n6:4,n3:12,type:'roughage'},oats:{name:'연맥',dm:88,nel:1.15,cp:9,n6:8,n3:6,type:'roughage'},corn:{name:'옥수수',dm:86,nel:2.05,cp:9,n6:50,n3:1,type:'concentrate'},soybean:{name:'대두박',dm:88,nel:1.95,cp:48,n6:40,n3:6,type:'concentrate'},mixFeed:{name:'배합사료',dm:88,nel:1.85,cp:16,n6:30,n3:2,type:'concentrate'},additive:{name:'오메가첨가',dm:95,nel:0,cp:0,n6:1,n3:100,type:'additive'}};

const store={
    view:'ranch',
    ranch:{cows:17,heifers:5,yield:25,bodyWeight:450,fat:5,protein:3.8,
        tmrMilking:{alfalfa:{asFed:5,price:850,dbKey:'alfalfa'},timothy:{asFed:4,price:900,dbKey:'timothy'},oats:{asFed:3,price:600,dbKey:'oats'},corn:{asFed:1,price:550,dbKey:'corn'},soybean:{asFed:0.5,price:800,dbKey:'soybean'},mixFeed:{asFed:1,price:700,dbKey:'mixFeed'},additive:{asFed:0.1,price:5000,dbKey:'additive'}},
        tmrHeifer:{alfalfa:{asFed:2,price:850,dbKey:'alfalfa'},timothy:{asFed:3,price:900,dbKey:'timothy'},oats:{asFed:1,price:600,dbKey:'oats'},mixFeed:{asFed:2,price:650,dbKey:'mixFeed'},corn:{asFed:0,price:550,dbKey:'corn'}},
        feedMilkingDaily:0,feedHeiferDaily:0,nutri:{},aiRec:{},fixedCost:12000000,processingRatio:50,napyuPrice:1100,transferPrice:3500},
    factory:{
        productAlloc:{mix:15,latteMilk:10,milk750:40,yogurt500:35},
        channelCafe:{milk750:30,yogurt500:30},
        cost:{labor:200,material:150,packaging:400,utility:100,mixAdditive:3000},
        marginRate:{mix:30,latteMilk:25,milk750:25,yogurt500:25},
        lossRate:5,fixedCost:7000000},
    cafe:{retail:{iceCream:6500,latte:7500,yogurt:10000,milk:10000},fees:{menu:25,goods:15},latteAddCost:1000,costLabor:3500000,costOps:1500000},
    specs:{iceCream:0.12,latte:0.18,yogurt:0.5,milk:0.75},
    results:null
};

let chartInstances={};

const logic={
    calc:function(){
        const r=store.ranch;
        const neMaint=0.08*Math.pow(r.bodyWeight,0.75);
        const neProd=r.yield*(0.0929*r.fat+0.0547*r.protein+0.192);
        const totalNELReq=neMaint+neProd;
        const cpMaint=5*Math.pow(r.bodyWeight,0.5);
        const milkProteinG=r.yield*r.protein*10;
        const reqProtein=(milkProteinG/0.65)+cpMaint;
        const fcm4=(0.4*r.yield)+(15*(r.fat/100)*r.yield);
        const limitDMI=(0.018*r.bodyWeight)+(0.305*fcm4);

        let mCost=0,supEnergy=0,supProtein=0,actualDMI=0,mAsFed=0,sumN6=0,sumN3=0,forageDM=0;
        for(const k in r.tmrMilking){const i=r.tmrMilking[k];const meta=nutriDB[i.dbKey];if(!meta)continue;const dmKg=i.asFed*(meta.dm/100);mCost+=i.asFed*i.price;mAsFed+=i.asFed;actualDMI+=dmKg;supEnergy+=dmKg*meta.nel;supProtein+=dmKg*(meta.cp*10);sumN6+=dmKg*meta.n6;sumN3+=dmKg*meta.n3;if(meta.type==='roughage')forageDM+=dmKg;}
        store.ranch.feedMilkingDaily=Math.round(mCost);
        let hCost=0;for(const k in r.tmrHeifer){hCost+=r.tmrHeifer[k].asFed*r.tmrHeifer[k].price;}
        store.ranch.feedHeiferDaily=Math.round(hCost);

        const omegaRatio=sumN3>0?sumN6/sumN3:0;
        const foragePct=actualDMI>0?(forageDM/actualDMI)*100:0;
        const grainPct=100-foragePct;
        const energyPerKg=(0.0929*r.fat+0.0547*r.protein+0.192);
        let predYield=0;if(supEnergy>neMaint)predYield=(supEnergy-neMaint)/energyPerKg;

        const aiRec={};const targetDMI=Math.min(limitDMI,16);const maxGrainDM=targetDMI*0.24;const targetForageDM=targetDMI-maxGrainDM;
        aiRec.alfalfa=(targetForageDM*0.6)/(nutriDB.alfalfa.dm/100);aiRec.timothy=(targetForageDM*0.4)/(nutriDB.timothy.dm/100);
        aiRec.corn=(maxGrainDM*0.3)/(nutriDB.corn.dm/100);aiRec.soybean=(maxGrainDM*0.2)/(nutriDB.soybean.dm/100);aiRec.mixFeed=(maxGrainDM*0.5)/(nutriDB.mixFeed.dm/100);aiRec.oats=0;aiRec.additive=0.5;
        store.ranch.aiRec=aiRec;
        store.ranch.nutri={reqEnergy:totalNELReq,supEnergy,reqProtein,supProtein,limitDMI,actualDMI,predYield,omegaRatio,grainPct,foragePct,mAsFed,mCost};
        return this.calculateBusiness(mCost,hCost);
    },

    calculateBusiness:function(mCostDaily,hCostDaily){
        const r=store.ranch,f=store.factory,c=store.cafe,n=r.nutri;

        // RANCH
        const dailyProd=n.predYield*r.cows;
        const monthlyProd=dailyProd*30;
        const volProcessing=monthlyProd*(r.processingRatio/100);
        const volNapyu=monthlyProd-volProcessing;
        const revRanch=(volNapyu*r.napyuPrice)+(volProcessing*r.transferPrice);
        const costFeed=(r.cows*mCostDaily*30)+(r.heifers*hCostDaily*30);
        const ranchExp=costFeed+r.fixedCost;
        const profitRanch=revRanch-ranchExp;
        const costPerLiter=monthlyProd>0?ranchExp/monthlyProd:0;
        const feedCostPerLiter=monthlyProd>0?costFeed/monthlyProd:0;

        // FACTORY
        const inputVol=volProcessing;
        const lossMult=1+(f.lossRate||5)/100;
        const pa=f.productAlloc,cc=f.channelCafe,fc=f.cost,mr=f.marginRate;

        const prodMix=inputVol*(pa.mix/100);
        const prodLatteMilk=inputVol*(pa.latteMilk/100);
        const prodMilk750=inputVol*(pa.milk750/100);
        const prodYogurt500=inputVol*(pa.yogurt500/100);

        const volMixCafe=prodMix;
        const volLatteMilkCafe=prodLatteMilk;
        const volMilk750Cafe=prodMilk750*(cc.milk750/100);
        const volMilk750D2C=prodMilk750-volMilk750Cafe;
        const volYogurt500Cafe=prodYogurt500*(cc.yogurt500/100);
        const volYogurt500D2C=prodYogurt500-volYogurt500Cafe;

        const baseCostPerL=r.transferPrice+fc.labor+fc.material+fc.utility;
        const costMixPerL=(baseCostPerL+fc.mixAdditive+fc.packaging)*lossMult;
        const costLatteMilkPerL=(baseCostPerL+fc.packaging*0.5)*lossMult;
        const costMilk750PerUnit=(baseCostPerL*0.75+fc.packaging)*lossMult;
        const costYogurt500PerUnit=(baseCostPerL*0.5+fc.packaging)*lossMult;

        const supplyMix=Math.ceil(costMixPerL*(1+mr.mix/100)/100)*100;
        const supplyLatteMilk20L=Math.ceil(costLatteMilkPerL*20*(1+mr.latteMilk/100)/100)*100;
        const supplyMilk750=Math.ceil(costMilk750PerUnit*(1+mr.milk750/100)/100)*100;
        const supplyYogurt500=Math.ceil(costYogurt500PerUnit*(1+mr.yogurt500/100)/100)*100;

        const revMixCafe=(volMixCafe/1)*supplyMix;
        const revLatteMilkCafe=(volLatteMilkCafe/20)*supplyLatteMilk20L;
        const revMilk750Cafe=(volMilk750Cafe/0.75)*supplyMilk750;
        const revYogurt500Cafe=(volYogurt500Cafe/0.5)*supplyYogurt500;
        const factRevFromCafe=revMixCafe+revLatteMilkCafe+revMilk750Cafe+revYogurt500Cafe;

        const d2cPriceMilk=supplyMilk750*1.3;
        const d2cPriceYogurt=supplyYogurt500*1.3;
        const revMilk750D2C=(volMilk750D2C/0.75)*d2cPriceMilk;
        const revYogurt500D2C=(volYogurt500D2C/0.5)*d2cPriceYogurt;
        const factRevD2C=revMilk750D2C+revYogurt500D2C;
        const factoryRev=factRevFromCafe+factRevD2C;

        const factRawCost=inputVol*r.transferPrice;
        const factLaborCost=inputVol*fc.labor;
        const factMaterialCost=inputVol*fc.material+prodMix*fc.mixAdditive;
        const factUtilityCost=inputVol*fc.utility;
        const factPackagingCost=(prodMix+prodLatteMilk*0.5+(prodMilk750/0.75)+(prodYogurt500/0.5))*fc.packaging;
        const factVarCost=factLaborCost+factMaterialCost+factUtilityCost+factPackagingCost;
        const factTotalCost=factRawCost+factVarCost+f.fixedCost;
        const factoryProfit=factoryRev-factTotalCost;

        // CAFE
        const unitsIceCream=volMixCafe/store.specs.iceCream;
        const unitsLatte=volLatteMilkCafe/store.specs.latte;
        const unitsMilk=volMilk750Cafe/store.specs.milk;
        const unitsYogurt=volYogurt500Cafe/store.specs.yogurt;

        const revIceCream=unitsIceCream*c.retail.iceCream;
        const revLatte=unitsLatte*c.retail.latte;
        const revMilk=unitsMilk*c.retail.milk;
        const revYogurt=unitsYogurt*c.retail.yogurt;
        const cafeRev=revIceCream+revLatte+revMilk+revYogurt;

        const cogsLatteAdd=unitsLatte*c.latteAddCost;
        const cafeCOGS=revMixCafe+revLatteMilkCafe+revMilk750Cafe+revYogurt500Cafe+cogsLatteAdd;

        const feeMenu=(revIceCream+revLatte)*(c.fees.menu/100);
        const feeGoods=(revMilk+revYogurt)*(c.fees.goods/100);
        const cafeFees=feeMenu+feeGoods;
        const cafeGross=cafeRev-cafeCOGS;
        const cafeFixed=c.costLabor+c.costOps;
        const cafeProfit=cafeRev-cafeCOGS-cafeFees-cafeFixed;

        const unitProfits={
            iceCream:c.retail.iceCream-(store.specs.iceCream*supplyMix)-(c.retail.iceCream*c.fees.menu/100),
            latte:c.retail.latte-((store.specs.latte/20)*supplyLatteMilk20L)-c.latteAddCost-(c.retail.latte*c.fees.menu/100),
            milk:c.retail.milk-supplyMilk750-(c.retail.milk*c.fees.goods/100),
            yogurt:c.retail.yogurt-supplyYogurt500-(c.retail.yogurt*c.fees.goods/100)
        };

        store.results={
            ranch:{dailyProdPerCow:n.predYield,dailyProd,monthlyProd,volNapyu,volProcessing,rev:revRanch,cost:ranchExp,profit:profitRanch,costFeed,costPerLiter,feedCostPerLiter},
            factory:{inputVol,production:{mix:prodMix,latteMilk:prodLatteMilk,milk750:prodMilk750,yogurt500:prodYogurt500},channel:{cafe:{mix:volMixCafe,latteMilk:volLatteMilkCafe,milk750:volMilk750Cafe,yogurt500:volYogurt500Cafe},d2c:{milk750:volMilk750D2C,yogurt500:volYogurt500D2C}},unitCost:{mix:costMixPerL,latteMilk20L:costLatteMilkPerL*20,milk750:costMilk750PerUnit,yogurt500:costYogurt500PerUnit},supply:{mix:supplyMix,latteMilk20L:supplyLatteMilk20L,milk750:supplyMilk750,yogurt500:supplyYogurt500},d2cPrice:{milk750:d2cPriceMilk,yogurt500:d2cPriceYogurt},rev:factoryRev,revCafe:factRevFromCafe,revD2C:factRevD2C,cost:{raw:factRawCost,labor:factLaborCost,material:factMaterialCost,utility:factUtilityCost,packaging:factPackagingCost,variable:factVarCost,fixed:f.fixedCost,total:factTotalCost},profit:factoryProfit},
            cafe:{units:{iceCream:unitsIceCream,latte:unitsLatte,milk:unitsMilk,yogurt:unitsYogurt},revDetail:{iceCream:revIceCream,latte:revLatte,milk:revMilk,yogurt:revYogurt},rev:cafeRev,cogs:cafeCOGS,gross:cafeGross,fees:cafeFees,feeDetails:{menu:feeMenu,goods:feeGoods},fixed:cafeFixed,costLabor:c.costLabor,costOps:c.costOps,profit:cafeProfit,unitProfits}
        };
        return store.results;
    }
};

const app={
    init:()=>{logic.calc();app.navigate('ranch');},
    navigate:(view)=>{store.view=view;['ranch','factory','sales','dashboard'].forEach(id=>{const el=document.getElementById('nav-'+id);if(el){el.className='tab-btn';if(id===view)el.classList.add('tab-active');}});app.render();},
    updateStatus:(data)=>{if(!data)return;const total=data.ranch.profit+data.factory.profit+data.cafe.profit;document.getElementById('st-ranch').innerText=app.fmt(data.ranch.profit);document.getElementById('st-factory').innerText=app.fmt(data.factory.profit);document.getElementById('st-cafe').innerText=app.fmt(data.cafe.profit);document.getElementById('st-total').innerText=app.fmt(total);},
    render:()=>{try{const data=logic.calc();if(!data)return;app.updateStatus(data);const main=document.getElementById('main-content');if(main){main.innerHTML='';if(store.view==='ranch')app.views.ranch(main,data);if(store.view==='factory')app.views.factory(main,data);if(store.view==='sales')app.views.cafe(main,data);if(store.view==='dashboard')app.views.dashboard(main,data);}}catch(e){console.error(e);}},
    fmt:(n)=>'₩ '+Math.round(n).toLocaleString(),
    fmtL:(n)=>Math.round(n).toLocaleString()+'L',
    ui:{
        slider:(mod,key,label,min,max,step,val,color='')=>'<div class="mb-2"><div class="flex justify-between text-xs font-bold text-slate-600 mb-1"><span>'+label+'</span><span class="'+color+'">'+(typeof val==='number'?val.toLocaleString():val)+'</span></div><input type="range" min="'+min+'" max="'+max+'" step="'+step+'" value="'+val+'" class="'+color+'" oninput="store.'+mod+'.'+key+'=parseFloat(this.value);app.render()"></div>',
        sliderNested:(path,label,min,max,step,val,color='')=>'<div class="mb-2"><div class="flex justify-between text-xs font-bold text-slate-600 mb-1"><span>'+label+'</span><span class="'+color+'">'+(typeof val==='number'?val.toLocaleString():val)+'</span></div><input type="range" min="'+min+'" max="'+max+'" step="'+step+'" value="'+val+'" class="'+color+'" oninput="'+path+'=parseFloat(this.value);app.render()"></div>',
        sliderBox:(mod,key,label,min,max,step,val,color='')=>'<div class="bg-slate-50 p-3 rounded border"><h4 class="font-bold text-xs text-slate-500 mb-2">'+label+'</h4><div class="flex justify-between text-sm font-bold '+color+' mb-1"><span>단가</span><span class="bg-white px-1 rounded">'+val.toLocaleString()+'</span></div><input type="range" min="'+min+'" max="'+max+'" step="'+step+'" value="'+val+'" oninput="store.'+mod+'.'+key+'=parseInt(this.value);app.render()"></div>',
        input:(path,label,val)=>'<div class="flex flex-col"><span class="text-[10px] text-slate-500">'+label+'</span><input type="number" class="w-full p-1 border rounded text-right font-bold text-sm" value="'+val+'" onchange="'+path+'=parseFloat(this.value);app.render()"></div>'
    },
    charts:{
        destroy:(id)=>{if(chartInstances[id]){chartInstances[id].destroy();delete chartInstances[id];}},
        nutriChart:(id,n)=>{const el=document.getElementById(id);if(!el)return;const ctx=el.getContext('2d');app.charts.destroy(id);chartInstances[id]=new Chart(ctx,{type:'bar',data:{labels:['유량','CP÷100','에너지','DMI'],datasets:[{label:'목표',data:[store.ranch.yield,n.reqProtein/100,n.reqEnergy,n.limitDMI],backgroundColor:'#cbd5e1',barPercentage:0.7},{label:'실제',data:[n.predYield,n.supProtein/100,n.supEnergy,n.actualDMI],backgroundColor:(ctx)=>{const idx=ctx.dataIndex;const val=ctx.raw;const target=ctx.chart.data.datasets[0].data[idx];if(idx===3&&val>target)return'#ef4444';if(val<target*0.95)return'#f59e0b';return'#10b981';},barPercentage:0.7}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top',labels:{boxWidth:10,font:{size:10}}}},scales:{y:{beginAtZero:true}}}});},
        waterfall:(id,res)=>{const el=document.getElementById(id);if(!el)return;const ctx=el.getContext('2d');app.charts.destroy(id);chartInstances[id]=new Chart(ctx,{type:'bar',data:{labels:['매출','원가','수수료','고정비','이익'],datasets:[{data:[res.rev,-res.cogs,-res.fees,-res.fixed,res.profit],backgroundColor:['#3b82f6','#ef4444','#f59e0b','#f97316',res.profit>=0?'#10b981':'#ef4444'],borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}}}});},
