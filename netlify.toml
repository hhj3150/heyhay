# HEY HAY MILK ERP — Netlify 배포 설정
# 프론트엔드(React) 정적 파일 호스팅

[build]
  base = "apps/frontend"
  command = "npm install && npm run build"
  publish = "dist"

# SPA 라우팅 — 모든 경로를 index.html로
[[redirects]]
  from = "/api/*"
  to = "https://heyhay-production.up.railway.app/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# 환경변수 (Netlify UI에서도 설정 가능)
[build.environment]
  NODE_VERSION = "20"
  VITE_API_URL = "https://heyhay-production.up.railway.app"
